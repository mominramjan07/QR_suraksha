<!DOCTYPE html>
<html>
<head>

<title>Create Profile - Suraksha QR</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
font-family:'Segoe UI',sans-serif;
background:#eef2f7;
display:flex;
flex-direction:column;
min-height:100vh;
}

/* HEADER */

.header{
background:linear-gradient(135deg,#4facfe,#00c6ff);
color:white;
padding:15px;
display:flex;
align-items:center;
justify-content:center;
gap:10px;
box-shadow:0 3px 10px rgba(0,0,0,0.2);
}

.header img{
width:40px;
height:40px;
border-radius:8px;
}

.header h1{
margin:0;
font-size:20px;
}

/* MAIN */

.main{
flex:1;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

/* FORM CARD */

.phone{
width:100%;
max-width:420px;
background:white;
border-radius:20px;
overflow:hidden;
box-shadow:0 10px 30px rgba(0,0,0,0.15);
}

/* CARD HEADER */

.card-header{
background:linear-gradient(135deg,#4facfe,#00f2fe);
color:white;
text-align:center;
padding:20px;
}

.card-header h2{
margin:0;
}

/* CONTENT */

.content{
padding:25px;
}

/* INPUT */

input{
width:100%;
padding:12px;
margin:8px 0;
border-radius:10px;
border:1px solid #ccc;
font-size:14px;
}

/* FILE INPUT */

input[type="file"]{
border:none;
}

/* BUTTON */

button{
width:100%;
padding:14px;
margin-top:12px;
background:#4facfe;
border:none;
color:white;
font-size:16px;
border-radius:25px;
cursor:pointer;
font-weight:600;
transition:0.3s;
}

button:hover{
background:#2f80ed;
transform:translateY(-2px);
box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

/* FOOTER */

.footer{
background:#4facfe;
color:white;
text-align:center;
padding:12px;
font-size:13px;
}

</style>

</head>

<body>

<!-- HEADER -->

<div class="header">

<img src="https://via.placeholder.com/40">

<h1>Suraksha QR</h1>

</div>

<!-- MAIN -->

<div class="main">

<div class="phone">

<div class="card-header">
<h2>Create Profile</h2>
</div>

<div class="content">

<form method="post" enctype="multipart/form-data">

{% csrf_token %}

<input name="owner" placeholder="Owner Name">

<input name="vehicle" placeholder="Vehicle Number">

<input name="model" placeholder="Vehicle Model">

<input name="license" placeholder="Driving License Number">

<input name="insurance" placeholder="Insurance Details">

<input name="blood" placeholder="Blood Group">

<input name="notes" placeholder="Medical Notes">

<input name="fname" placeholder="Family Member Name">

<input name="phone" placeholder="Family Phone Number">

<label style="margin-top:10px; display:block;">Upload Profile Image:</label>

<input type="file" name="profile_image" accept="image/*">

<!-- DOCUMENT UPLOAD SECTION -->

<h3 style="margin-top:15px;">📁 Upload Documents</h3>

<label>Aadhar Card</label>
<input type="file" name="aadhar" accept="image/*,.pdf">

<label>RC Book</label>
<input type="file" name="rc_book" accept="image/*,.pdf">

<label>Driving License</label>
<input type="file" name="license_file" accept="image/*,.pdf">

<label>Insurance Document</label>
<input type="file" name="insurance_file" accept="image/*,.pdf">

<button type="submit">
Save Profile
</button>

</form>

</div>

</div>

</div>

<!-- FOOTER -->

<div class="footer">

© 2026 Suraksha QR System | Emergency Safety Platform

</div>

</body>
</html>
