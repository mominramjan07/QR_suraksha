<!DOCTYPE html>
{% load static %}
<html>
<head>
<title>Suraksha QR</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
font-family:'Segoe UI',sans-serif;
background:#eef2f7;
display:flex;
flex-direction:column;
min-height:100vh;
}

/* HEADER */

.header{
background:linear-gradient(135deg,#4facfe,#00c6ff);
color:white;
padding:16px;
display:flex;
align-items:center;
justify-content:center;
gap:10px;
box-shadow:0 3px 12px rgba(0,0,0,0.2);
}

.header img{
width:40px;
height:40px;
border-radius:8px;
}

.header h1{
margin:0;
font-size:20px;
font-weight:600;
}

/* MAIN */

.main{
flex:1;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

/* CARD */

.card{
width:100%;
max-width:380px;
background:white;
border-radius:18px;
padding:35px 25px;
text-align:center;
box-shadow:0 10px 25px rgba(0,0,0,0.12);
}

.card h2{
margin-top:0;
color:#333;
}

.card p{
color:#666;
margin-bottom:25px;
}

/* BUTTONS */

.button-group{
display:flex;
flex-direction:column;
gap:15px;
}

.btn{
display:flex;
align-items:center;
justify-content:center;
gap:10px;
width:100%;
padding:15px;
border:none;
border-radius:12px;
font-size:16px;
font-weight:600;
text-decoration:none;
color:white;
transition:0.25s;
}

.register{
background:#2ecc71;
}

.login{
background:#3498db;
}

.btn:hover{
transform:scale(1.03);
box-shadow:0 6px 18px rgba(0,0,0,0.2);
}

/* FOOTER */

.footer{
background:#4facfe;
color:white;
text-align:center;
padding:12px;
font-size:13px;
box-shadow:0 -2px 8px rgba(0,0,0,0.15);
}

</style>
</head>

<body>

<!-- HEADER -->

<div class="header">

<img src="{% static 'logo.jpeg' %}">


<h1>Suraksha QR</h1>

</div>

<!-- MAIN -->

<div class="main">

<div class="card">

<h2>Welcome</h2>

<p>Smart Emergency Safety System</p>

<div class="button-group">

<a href="/register/" class="btn register">
📝 Register
</a>

<a href="/login/" class="btn login">
🔐 Login
</a>

</div>

</div>

</div>

<!-- FOOTER -->

<div class="footer">

© 2026 Suraksha QR System  
Developed for Emergency Safety And Developed By Momin Ramjan

</div>

</body>
</html>
