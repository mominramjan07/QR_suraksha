{% load static %}
<!DOCTYPE html>
<html>
<head>

<title>Register - Suraksha QR</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
font-family:'Segoe UI',sans-serif;
background:#eef2f7;
display:flex;
flex-direction:column;
min-height:100vh;
}

/* HEADER */

.header{
background:linear-gradient(135deg,#4facfe,#00c6ff);
color:white;
padding:16px;
display:flex;
align-items:center;
justify-content:center;
gap:10px;
box-shadow:0 3px 12px rgba(0,0,0,0.2);
}

.header img{
width:40px;
height:40px;
border-radius:8px;
}

.header h1{
margin:0;
font-size:20px;
font-weight:600;
}

/* MAIN AREA */

.main{
flex:1;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

/* FORM CARD */

.card{
width:100%;
max-width:400px;
background:white;
border-radius:18px;
padding:30px 25px;
box-shadow:0 10px 25px rgba(0,0,0,0.12);
}

.card h2{
text-align:center;
margin-top:0;
color:#333;
}

/* FORM */

form p{
text-align:left;
margin-bottom:10px;
font-size:14px;
color:#555;
}

input{
width:100%;
padding:12px;
margin-top:6px;
margin-bottom:15px;
border-radius:10px;
border:1px solid #ccc;
font-size:14px;
}

input:focus{
outline:none;
border-color:#4facfe;
box-shadow:0 0 5px rgba(79,172,254,0.4);
}

/* BUTTON */

button{
width:100%;
padding:14px;
border:none;
border-radius:12px;
background:#4facfe;
color:white;
font-size:16px;
font-weight:600;
cursor:pointer;
transition:0.25s;
}

button:hover{
background:#3498db;
}

/* LOGIN LINK */

.footer-link{
text-align:center;
margin-top:15px;
}

.footer-link a{
text-decoration:none;
color:#4facfe;
font-weight:600;
}

/* PAGE FOOTER */

.footer{
background:#4facfe;
color:white;
text-align:center;
padding:12px;
font-size:13px;
}

</style>

</head>

<body>

<!-- HEADER -->

<div class="header">

<img src="{% static 'logo.jpeg' %}">


<h1>Suraksha QR</h1>

</div>

<!-- MAIN -->

<div class="main">

<div class="card">

<h2>Create Account</h2>

<form method="post">
{% csrf_token %}

{{ form.as_p }}

<button type="submit">
Register
</button>

</form>

<div class="footer-link">

<p>Already have an account?</p>

<a href="/login/">Login Here</a>

</div>

</div>

</div>

<!-- FOOTER -->

<div class="footer">

© 2026 Suraksha QR System | Developed By Momin Ramjan


</div>

</body>
</html>
